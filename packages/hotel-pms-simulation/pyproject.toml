[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "hotel-pms-simulation"
version = "0.1.0"
description = "Hotel Property Management System Lambda API"
readme = "README.md"
requires-python = ">=3.13,<4"
authors = [
    { name = "Hotel Assistant Team" }
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "boto3>=1.35.0",
    "aws-lambda-powertools[all]>=2.43.0",
    "pydantic>=2.5.0",
    "python-json-logger>=2.0.7",
    "urllib3>=2.0.0",
    "pg8000>=1.31.4",
    "scramp>=1.4.5",
    "fastmcp>=2.13.1",
    "mcp>=1.3.2",
    "httpx>=0.28.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.1.0",
    "mypy>=1.7.0",
]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",  # pycodestyle errors
    "W",  # pycodestyle warnings
    "F",  # pyflakes
    "I",  # isort
    "B",  # flake8-bugbear
    "C4", # flake8-comprehensions
    "UP", # pyupgrade
]
ignore = [
    "E501", # line too long, handled by black
    "B008", # do not perform function calls in argument defaults
    "B904", # raise from within except - we log the error before raising
    "C901", # too complex
]

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
disallow_any_generics = true
disallow_incomplete_defs = true
disallow_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "-ra -q --strict-markers --strict-config -m 'not integration'"
testpaths = ["tests"]
markers = [
    "integration: marks tests as integration tests (require deployed AWS infrastructure)",
    "unit: marks tests as unit tests (no external dependencies)",
    "aws: marks tests that require AWS credentials and services",
]
asyncio_mode = "auto"
log_cli = true
log_cli_level = "INFO"
log_cli_format = "%(asctime)s [%(levelname)8s] %(name)s: %(message)s"
log_cli_date_format = "%Y-%m-%d %H:%M:%S"
timeout = 300


[tool.coverage.run]
source = ["hotel_pms_simulation"]
omit = [
    "*/tests/*",
    "*/test_*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
]

[dependency-groups]
dev = [
    "mypy>=1.17.1",
    "pytest>=8.4.1",
    "pytest-asyncio>=0.21.0",
    "pytest-cov>=6.2.1",
    "pytest-timeout>=2.1.0",
    "pyyaml>=6.0.2",
    "ruff>=0.12.7",
    "urllib3>=2.5.0",
    "requests>=2.31.0",
    "botocore>=1.35.0",
    "openapi-spec-validator>=0.7.2",
    "datamodel-code-generator>=0.26.0",
    "hypothesis>=6.100.0",
]
