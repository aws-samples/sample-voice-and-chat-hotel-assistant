[project]
name = "virtual-assistant-common"
version = "1.0.0"
description = "Shared utilities and components for virtual assistant packages"
requires-python = ">=3.13,<4"
dependencies = [
    # HTTP client with authentication support
    "httpx>=0.25.0",
    "httpx-sse>=0.4.0",
    # MCP protocol support
    "mcp>=1.0.0",
    # Async utilities
    "anyio>=4.0.0",
    # AWS SDK for Cognito and Secrets Manager
    "boto3>=1.34.0",
    # Data validation and serialization
    "pydantic>=2.0.0",
    # Retry logic with exponential backoff
    "tenacity>=8.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["virtual_assistant_common"]

[tool.hatch.metadata]
allow-direct-references = true

[dependency-groups]
dev = [
    # Code formatting and linting
    "autopep8>=2.3.1",
    "ruff>=0.8.2",
    # Testing
    "pytest>=8.3.5",
    "pytest-asyncio>=0.23.0",
    "pytest-mock>=3.12.0",
    # AWS service mocking for tests (removed moto dependency)
    # Environment management
    "python-dotenv>=1.0.0",
    "hypothesis>=6.148.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.ruff]
exclude = [
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "dist",
]

line-length = 120
indent-width = 4

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]
ignore = []

fixable = ["ALL"]
unfixable = []

[tool.pytest.ini_options]
markers = [
    "integration: marks tests as integration tests that require real AWS services and .env file",
]
testpaths = ["tests"]
addopts = "-m 'not integration'"
asyncio_mode = "auto"
# Integration tests are in tests/integration/ and require .env file with real AWS credentials