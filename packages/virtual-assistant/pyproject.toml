[tool.uv.workspace]
members = [
    "virtual-assistant-livekit",
    "virtual-assistant-chat", 
    "virtual-assistant-common",
    "virtual-assistant-messaging-lambda"
]

[tool.uv.sources]
virtual-assistant-common = { workspace = true }

[tool.uv]
constraint-dependencies = [
    "pygments>=2.20.0",
    "cryptography>=46.0.6",
    "requests>=2.33.0",
    "pyjwt>=2.12.0",
    "multipart>=1.3.1",
    "joserfc>=1.6.3",
    "werkzeug>=3.1.6",
    "protobuf>=6.33.5",
    "python-multipart>=0.0.22",
    "urllib3>=2.6.3",
    "aiohttp>=3.13.3",
]

# Workspace root - no package definition needed

[dependency-groups]
dev = [
    # Shared development tools
    "autopep8>=2.3.1",
    "ruff>=0.8.2",
    "pytest>=9.0.3",
    "pytest-asyncio>=0.24.0",
    "pytest-mock>=3.14.0",
]

# No build system needed for workspace root

[tool.ruff]
exclude = [
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "dist",
]

line-length = 120
indent-width = 4

[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
]
ignore = []

fixable = ["ALL"]
unfixable = []

[tool.pytest.ini_options]
markers = [
    "integration: marks tests as integration tests",
]
testpaths = ["tests"]
addopts = "-m 'not integration'"